<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店舗管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Yu Gothic", "Meiryo", sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
    header {
      background: #1e2a3a; color: white;
      padding: 10px 18px; font-size: 15px; font-weight: bold;
      display: flex; align-items: center; gap: 12px;
    }
    header a { color: #aaa; font-size: 12px; text-decoration: none; margin-left: auto; }
    header a:hover { color: white; }

    .container { max-width: 900px; margin: 24px auto; padding: 0 16px; }

    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .top-bar h2 { font-size: 16px; color: #333; }
    .btn-add {
      padding: 8px 18px; background: #d4a827; border: none; border-radius: 6px;
      font-size: 13px; font-weight: bold; color: #0a0800; cursor: pointer; font-family: inherit;
    }
    .btn-add:hover { background: #c09820; }

    .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }

    .store-card {
      background: white; border-radius: 10px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1); transition: box-shadow 0.15s;
    }
    .store-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.15); }
    .store-card-img {
      width: 100%; height: 130px; object-fit: cover; background: #e8e8e8;
      display: flex; align-items: center; justify-content: center; font-size: 32px; color: #bbb;
    }
    .store-card-img img { width: 100%; height: 130px; object-fit: cover; display: block; }
    .store-card-body { padding: 12px 14px; }
    .store-card-name { font-size: 15px; font-weight: bold; color: #222; margin-bottom: 4px; }
    .store-card-loc { font-size: 11px; color: #888; margin-bottom: 8px; }
    .store-card-url { font-size: 10px; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 10px; }
    .store-card-btns { display: flex; gap: 6px; }
    .btn-edit {
      flex: 1; padding: 6px; background: #f0f0f0; border: none; border-radius: 5px;
      font-size: 12px; cursor: pointer; font-family: inherit;
    }
    .btn-edit:hover { background: #e0e0e0; }
    .btn-del {
      padding: 6px 10px; background: #fee; border: none; border-radius: 5px;
      font-size: 12px; color: #c00; cursor: pointer; font-family: inherit;
    }
    .btn-del:hover { background: #fcc; }

    .empty { text-align: center; padding: 60px; color: #aaa; font-size: 14px; }

    /* モーダル */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 12px; width: 500px; max-height: 90vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-header {
      background: #1e2a3a; color: white; padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .modal-header h3 { font-size: 14px; }
    .modal-close { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
    .modal-body { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
    .modal-footer { padding: 14px 20px; border-top: 1px solid #eee; display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }

    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 11px; color: #666; font-weight: bold; }
    .form-group input {
      padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 13px; font-family: inherit; outline: none;
    }
    .form-group input:focus { border-color: #d4a827; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .img-preview-wrap {
      width: 100%; height: 120px; border: 2px dashed #ddd; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; overflow: hidden; position: relative;
    }
    .img-preview-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .img-preview-wrap .placeholder { color: #bbb; font-size: 13px; text-align: center; }
    .img-preview-wrap:hover { border-color: #d4a827; }

    .btn-save {
      padding: 9px 20px; background: #d4a827; border: none; border-radius: 6px;
      font-size: 13px; font-weight: bold; color: #0a0800; cursor: pointer; font-family: inherit;
    }
    .btn-save:hover { background: #c09820; }
    .btn-cancel {
      padding: 9px 16px; background: #f0f0f0; border: none; border-radius: 6px;
      font-size: 13px; cursor: pointer; font-family: inherit;
    }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1e2a3a; color: white; padding: 10px 20px; border-radius: 8px;
      font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  🏪 店舗管理
  <a href="/article-generator">← 記事ジェネレーターに戻る</a>
</header>

<div class="container">
  <div class="top-bar">
    <h2>登録店舗一覧</h2>
    <button class="btn-add" onclick="openModal()">＋ 店舗を追加</button>
  </div>
  <div class="store-grid" id="store-grid">
    <div class="empty">読み込み中...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">店舗を追加</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>店舗名</label>
        <input id="m-name" placeholder="例：KOHAKU天白">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>都道府県</label>
          <input id="m-pref" placeholder="例：愛知県">
        </div>
        <div class="form-group">
          <label>市区名（市なし）</label>
          <input id="m-city" placeholder="例：名古屋">
        </div>
      </div>
      <div class="form-group">
        <label>p-world URL（台数自動取得用）</label>
        <input id="m-pworld" placeholder="https://www.p-world.co.jp/...">
      </div>
      <div class="form-group">
        <label>店舗外観画像</label>
        <div class="img-preview-wrap" id="img-preview-wrap" onclick="document.getElementById('img-file').click()">
          <div class="placeholder" id="img-placeholder">📷 クリックして画像を選択</div>
        </div>
        <input type="file" id="img-file" accept="image/*" style="display:none" onchange="onImgSelect(event)">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveStore()">💾 保存</button>
    </div>
  </div>
</div>

<script>
let storeData = {};
let editingName = null; // 編集中の店舗名（nullなら新規）
let currentImgDataUrl = null;

// ── 初期化 ──────────────────────────────────────────────────
async function init() {
  await loadStores();
  renderGrid();
}

async function loadStores() {
  try {
    const res = await fetch('/api/library');
    const data = await res.json();
    storeData = data.stores || {};
  } catch(e) {
    console.error(e);
  }
}

async function saveStores() {
  const res = await fetch('/api/library');
  const existing = await res.json();
  await fetch('/api/library', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...existing, stores: storeData }),
  });
}

// ── 一覧描画 ────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('store-grid');
  const entries = Object.values(storeData);
  if (!entries.length) {
    grid.innerHTML = '<div class="empty">まだ店舗が登録されていません<br>「＋ 店舗を追加」から登録してください</div>';
    return;
  }
  grid.innerHTML = entries.map(s => {
    const imgHtml = s.storeImgUrl
      ? `<img src="${s.storeImgUrl}" onerror="this.style.display='none'">`
      : `<div style="width:100%;height:130px;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:32px;color:#bbb;">🏪</div>`;
    const loc = [s.pref, s.city ? s.city + '市' : ''].filter(Boolean).join(' ');
    const safeName = s.name.replace(/'/g, "\\'");
    return `
    <div class="store-card">
      ${imgHtml}
      <div class="store-card-body">
        <div class="store-card-name">${s.name}</div>
        <div class="store-card-loc">${loc}</div>
        <div class="store-card-url">${s.pworldUrl || 'p-world未設定'}</div>
        <div class="store-card-btns">
          <button class="btn-edit" onclick="openModal('${safeName}')">✏ 編集</button>
          <button class="btn-del" onclick="deleteStore('${safeName}')">削除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── モーダル ─────────────────────────────────────────────────
function openModal(name) {
  editingName = name || null;
  currentImgDataUrl = null;

  const s = name ? storeData[name] : null;
  document.getElementById('modal-title').textContent = name ? '店舗を編集' : '店舗を追加';
  document.getElementById('m-name').value   = s?.name    || '';
  document.getElementById('m-pref').value   = s?.pref    || '';
  document.getElementById('m-city').value   = s?.city    || '';
  document.getElementById('m-pworld').value = s?.pworldUrl || '';

  // 画像プレビュー
  const wrap = document.getElementById('img-preview-wrap');
  const ph   = document.getElementById('img-placeholder');
  const existing = s?.storeImgUrl;
  if (existing) {
    currentImgDataUrl = existing;
    wrap.innerHTML = `<img src="${existing}" onerror="this.style.display='none'">`;
  } else {
    wrap.innerHTML = '<div class="placeholder" id="img-placeholder">📷 クリックして画像を選択</div>';
  }

  document.getElementById('img-file').value = '';
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  editingName = null;
  currentImgDataUrl = null;
}

function onImgSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    currentImgDataUrl = e.target.result;
    const wrap = document.getElementById('img-preview-wrap');
    wrap.innerHTML = `<img src="${currentImgDataUrl}">`;
  };
  reader.readAsDataURL(file);
}

async function saveStore() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { showToast('店舗名を入力してください'); return; }

  const pref     = document.getElementById('m-pref').value.trim();
  const city     = document.getElementById('m-city').value.trim();
  const pworldUrl = document.getElementById('m-pworld').value.trim();

  // 名前が変わった場合、古いエントリを削除
  if (editingName && editingName !== name) {
    delete storeData[editingName];
  }

  const existing = storeData[name] || {};
  storeData[name] = {
    ...existing,
    name, pref, city, pworldUrl,
    storeImgUrl: currentImgDataUrl || existing.storeImgUrl || '',
  };

  await saveStores();
  renderGrid();
  closeModal();
  showToast(`「${name}」を保存しました`);
}

async function deleteStore(name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;
  delete storeData[name];
  await saveStores();
  renderGrid();
  showToast(`「${name}」を削除しました`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>
</body>
</html>
